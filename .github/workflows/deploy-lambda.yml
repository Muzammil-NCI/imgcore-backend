name: Deploy Lambda

on:
  workflow_dispatch:
    inputs:
      function_name:
        description: Lambda function name
        required: false
        default: ""
  push:
    branches:
      - main
    paths:
      - "app/**"
      - "main.py"
      - "requirements.txt"
      - ".github/workflows/deploy-lambda.yml"

env:
  # Target Lambda runtime Python (pip --python-version / manylinux wheels)
  LAMBDA_PYTHON_VERSION: "3.14"
  SERVICE_NAME: ${{ vars.SERVICE_NAME || 'imagecore-backend' }}
  STAGE: ${{ vars.STAGE || 'prod' }}

jobs:
  deploy:
    name: Package and deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.LAMBDA_PYTHON_VERSION }}

      - name: Install dependencies into dependencies/
        run: |
          python -m pip install --upgrade pip
          rm -rf dependencies lambda.zip
          pip install -r requirements.txt \
            --platform manylinux2014_x86_64 \
            --target dependencies \
            --only-binary=:all: \
            --python-version ${{ env.LAMBDA_PYTHON_VERSION }}

      - name: Copy application into package
        run: |
          cp -r app dependencies/
          cp main.py dependencies/

      - name: Create lambda.zip
        run: |
          cd dependencies
          zip -r ../lambda.zip . -q

      - name: Upload artifact (optional debug)
        uses: actions/upload-artifact@v4
        with:
          name: lambda-package
          path: lambda.zip
          retention-days: 7

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Update Lambda function code
        run: |
          aws lambda update-function-code \
            --function-name demo-fast-api-function \
            --zip-file fileb://lambda.zip

      - name: Summary
        if: always()
        run: |
          echo "## Lambda deploy" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Commit**: \`${{ github.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Branch**: ${{ github.ref_name }}" >> "$GITHUB_STEP_SUMMARY"
